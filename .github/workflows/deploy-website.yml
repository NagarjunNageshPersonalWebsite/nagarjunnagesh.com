# This is a basic workflow to help you get started with Actions
name: Deploy NAGARJUNNAGESH Static to PRODUCTION

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  workflow_dispatch:
  push: 
    branches: 
        main
    
env:
  PROD_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
  PROD_CLOUDFRONT_DISTRIBUTION: ${{ secrets.NAGARJUNNAGESH_COM_CLOUDFRONT_ID }}
  PROD_WWW_CLOUDFRONT_DISTRIBUTION: ${{ secrets.WWW_NAGARJUNNAGESH_COM_CLOUDFRONT_ID }}
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - name: Configure AWS credentials from Production account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: SessionRetrieveAndValidateAPIKey

      - name: NAGARJUNNAGESH to Upload to S3
        working-directory: frontend
        run: |
          aws s3 sync . s3://${{ env.PROD_BUCKET_NAME }}/ \
          --exclude 'SECURE_FORM_README.md'

      - name: Invalidate Cloudfront Distribution NAGARJUNNAGESH.es
        working-directory: frontend
        run: |
          aws cloudfront create-invalidation --distribution-id ${{env.PROD_CLOUDFRONT_DISTRIBUTION}} --paths "/*"

      - name: Invalidate Cloudfront Distribution www.NAGARJUNNAGESH.es
        working-directory: frontend
        run: |
          aws cloudfront create-invalidation --distribution-id ${{env.PROD_WWW_CLOUDFRONT_DISTRIBUTION}} --paths "/*"